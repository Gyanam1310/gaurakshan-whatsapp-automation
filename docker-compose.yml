services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsapp-backend
    restart: always
    environment:
      PORT: 5000
      NODE_ENV: production
      GROUP_ID: ${GROUP_ID}
      SPREADSHEET_ID: ${SPREADSHEET_ID}
      DRIVE_FOLDER_ID: ${DRIVE_FOLDER_ID}
      GOOGLE_SERVICE_ACCOUNT_KEY: /app/config/service-account.json
      WHATSAPP_SESSION_DIR: /app/session
      LOG_DIR: /app/logs
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-30000}
      WHATSAPP_CONNECT_TIMEOUT_MS: ${WHATSAPP_CONNECT_TIMEOUT_MS:-45000}
      WHATSAPP_MAX_RECONNECT_ATTEMPTS: ${WHATSAPP_MAX_RECONNECT_ATTEMPTS:-12}
      WHATSAPP_RECONNECT_BASE_DELAY_MS: ${WHATSAPP_RECONNECT_BASE_DELAY_MS:-2000}
      WHATSAPP_RECONNECT_MAX_DELAY_MS: ${WHATSAPP_RECONNECT_MAX_DELAY_MS:-60000}
      WHATSAPP_SEND_TIMEOUT_MS: ${WHATSAPP_SEND_TIMEOUT_MS:-25000}
      WHATSAPP_SEND_RETRY_ATTEMPTS: ${WHATSAPP_SEND_RETRY_ATTEMPTS:-2}
      WHATSAPP_SEND_RETRY_BASE_DELAY_MS: ${WHATSAPP_SEND_RETRY_BASE_DELAY_MS:-1500}
    volumes:
      - backend-session:/app/session
      - backend-uploads:/app/tmp-uploads
      - backend-logs:/app/logs
      - ${GOOGLE_CREDENTIALS_FILE:-./service-account.json}:/app/config/service-account.json:ro
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/healthz').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1));"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 25s
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatsapp-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - app-network

  n8n:
    image: n8nio/n8n:1.111.0
    container_name: whatsapp-n8n
    restart: always
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Kolkata}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-strongpassword}
      BACKEND_BASE_URL: http://backend:5000
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/files/workflows
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5678:5678"
    networks:
      - app-network

volumes:
  backend-session:
  backend-uploads:
  backend-logs:
  n8n-data:

networks:
  app-network:
    driver: bridge
